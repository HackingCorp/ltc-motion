<template id="moodboard-template">
  <div data-composition-id="moodboard" data-width="1920" data-height="1080">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,700;9..144,900&family=Archivo:wght@300;400;500;700;900&family=Archivo+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f1ece2;
        --bg-2: #ebe4d4;
        --paper: #fbf8f1;
        --ink: #14181f;
        --ink-soft: #2b2f38;
        --muted: #6c6457;
        --accent: #1f3a8a;       /* deep cobalt ink */
        --accent-2: #b94a3e;     /* terracotta */
        --gold: #b8893a;         /* connecting lines */
        --gold-soft: rgba(184, 137, 58, 0.55);
        --font-display: "Fraunces", Georgia, serif;
        --font-ui: "Archivo", "Helvetica Neue", sans-serif;
        --font-mono: "Archivo Mono", monospace;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
      }

      .scene {
        position: absolute;
        top: 0; left: 0;
        width: 1920px; height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(ellipse at 30% 20%, #f6f0e3 0%, transparent 55%),
          radial-gradient(ellipse at 80% 90%, #e8dfca 0%, transparent 60%),
          var(--bg);
      }
      .scene-content {
        width: 100%; height: 100%;
        position: relative; z-index: 1;
      }

      /* ---- paper grain ---- */
      .grain {
        position: absolute; inset: 0;
        pointer-events: none; z-index: 50;
        opacity: 0.22;
        background-image:
          radial-gradient(rgba(20, 24, 31, 0.10) 1px, transparent 1.2px),
          radial-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1.2px);
        background-size: 3px 3px, 5px 5px;
        background-position: 0 0, 1px 2px;
        mix-blend-mode: multiply;
      }
      .vignette {
        position: absolute; inset: 0;
        pointer-events: none; z-index: 49;
        background: radial-gradient(ellipse at center, transparent 55%, rgba(40,32,18,0.18) 100%);
      }

      /* ---- crown / brand name ---- */
      .crown {
        position: absolute;
        top: 64px; left: 50%;
        transform: translateX(-50%);
        display: flex; align-items: center; gap: 28px;
        z-index: 5;
      }
      .crown-line {
        height: 1px;
        background: var(--ink);
        width: 480px;
        transform-origin: right center;
      }
      .crown-line.right { transform-origin: left center; }
      .crown-name {
        font-family: var(--font-display);
        font-weight: 300;
        font-style: italic;
        font-size: 44px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink);
        white-space: nowrap;
      }
      .crown-name b {
        font-style: normal;
        font-weight: 900;
        letter-spacing: 0.08em;
      }
      .crown-meta {
        position: absolute;
        top: 132px; left: 50%;
        transform: translateX(-50%);
        font-family: var(--font-mono);
        font-size: 14px;
        letter-spacing: 0.4em;
        color: var(--muted);
        text-transform: uppercase;
        z-index: 5;
      }

      /* ---- swatches row ---- */
      .swatches {
        position: absolute;
        top: 220px; left: 140px;
        display: flex; gap: 28px;
        z-index: 4;
      }
      .swatch {
        width: 132px; height: 168px;
        background: var(--paper);
        padding: 14px 14px 16px;
        box-shadow:
          0 1px 0 rgba(0,0,0,0.04),
          0 18px 30px -18px rgba(20,18,10,0.35);
        display: flex; flex-direction: column;
        position: relative;
      }
      .swatch .chip {
        flex: 1;
        width: 100%;
      }
      .swatch .label {
        font-family: var(--font-mono);
        font-size: 11px;
        margin-top: 10px;
        letter-spacing: 0.18em;
        color: var(--ink-soft);
        text-transform: uppercase;
      }
      .swatch .hex {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--muted);
        margin-top: 2px;
        letter-spacing: 0.1em;
      }
      .sw1 .chip { background: #14181f; }
      .sw2 .chip { background: #1f3a8a; }
      .sw3 .chip { background: #b94a3e; }
      .sw4 .chip { background: #d8c89a; }
      .sw5 .chip { background: #f1ece2; border: 1px solid #d8d2c2; }
      .sw6 .chip { background: #2f5d3a; }

      /* glow on accent swatch (sw2) */
      .sw2 {
        position: relative;
      }
      .sw2 .glow {
        position: absolute;
        inset: -10px;
        border-radius: 4px;
        background: radial-gradient(closest-side, rgba(31, 58, 138, 0.45), transparent 70%);
        filter: blur(8px);
        z-index: -1;
        opacity: 0;
      }

      /* ---- logo ---- */
      .logo-stage {
        position: absolute;
        top: 470px; left: 200px;
        width: 220px; height: 220px;
        z-index: 4;
      }
      .logo-card {
        width: 100%; height: 100%;
        background: var(--ink);
        color: var(--paper);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 24px 36px -16px rgba(20,18,10,0.55);
        position: relative;
      }
      .logo-mark {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 132px;
        line-height: 1;
        letter-spacing: -0.04em;
        position: relative;
      }
      .logo-mark .dot {
        position: absolute;
        right: -18px; bottom: 22px;
        width: 16px; height: 16px;
        background: var(--accent-2);
        border-radius: 50%;
      }
      .logo-caption {
        position: absolute;
        bottom: -32px; left: 0;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.32em;
        color: var(--muted);
        text-transform: uppercase;
      }

      /* ---- typography panel ---- */
      .type-panel {
        position: absolute;
        top: 750px; left: 160px;
        width: 560px;
        z-index: 4;
      }
      .type-row {
        margin-bottom: 22px;
      }
      .type-name {
        font-size: 64px;
        line-height: 1;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
      }
      .type-name.fraunces {
        font-family: var(--font-display);
        font-weight: 700;
        font-style: italic;
        letter-spacing: -0.02em;
      }
      .type-name.archivo {
        font-family: var(--font-ui);
        font-weight: 900;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        font-size: 56px;
      }
      .type-meta {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.3em;
        color: var(--muted);
        text-transform: uppercase;
        margin-top: 6px;
      }
      .type-cursor {
        display: inline-block;
        width: 4px;
        background: currentColor;
        margin-left: 4px;
        vertical-align: -8px;
      }

      /* ---- screenshot cards ---- */
      .cards {
        position: absolute;
        top: 220px; left: 880px;
        width: 900px; height: 720px;
        z-index: 4;
      }
      .card {
        position: absolute;
        background: var(--paper);
        padding: 16px 16px 60px;
        box-shadow:
          0 2px 0 rgba(0,0,0,0.03),
          0 36px 50px -28px rgba(20,18,10,0.5),

      }
      .card .img {
        width: 100%; height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .card .cap {
        position: absolute;
        bottom: 18px; left: 18px;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.22em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .card-1 { top: 30px; left: 60px; width: 380px; height: 250px; transform: rotate(-4.5deg); }
      .card-1 .img { background-image: url('assets/screenshot1.jpg'); height: 195px; }
      .card-2 { top: 80px; left: 380px; width: 360px; height: 240px; transform: rotate(3deg); }
      .card-2 .img { background-image: url('assets/screenshot2.png'); height: 185px; }
      .card-3 { top: 290px; left: 120px; width: 340px; height: 280px; transform: rotate(2.2deg); }
      .card-3 .img { background-image: url('assets/screenshot3.jpg'); height: 225px; }
      .card-4 { top: 320px; left: 440px; width: 320px; height: 240px; transform: rotate(-3deg); }
      .card-4 .img { background-image: url('assets/screenshot4.jpg'); height: 185px; }
      .card-5 { top: 540px; left: 280px; width: 300px; height: 200px; transform: rotate(-2deg); }
      .card-5 .img { background-image: url('assets/screenshot5.jpg'); height: 145px; }

      .card .pin {
        position: absolute;
        top: -8px; left: 50%;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 4px 6px rgba(0,0,0,0.25);
        transform: translateX(-50%);
      }

      /* ---- connector lines ---- */
      .connectors {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }
      .connectors path {
        fill: none;
        stroke: var(--gold);
        stroke-width: 1.4;
        stroke-linecap: round;
        opacity: 0.85;
      }
      .connectors circle {
        fill: var(--gold);
        opacity: 0.95;
      }

      /* ---- floating sticky / annotation ---- */
      .sticky {
        position: absolute;
        top: 470px; left: 470px;
        width: 220px;
        background: #f7e6a8;
        padding: 18px 18px 22px;
        font-family: var(--font-display);
        font-style: italic;
        font-size: 22px;
        line-height: 1.25;
        color: var(--ink);
        transform: rotate(-5deg);
        box-shadow: 0 18px 22px -14px rgba(20,18,10,0.4);
        z-index: 4;
      }
      .sticky::after {
        content: "";
        position: absolute;
        top: -10px; left: 50%;
        transform: translateX(-50%) rotate(-12deg);
        width: 60px; height: 18px;
        background: rgba(255,255,255,0.5);
        border: 1px solid rgba(0,0,0,0.05);
      }
      .sticky .sig {
        margin-top: 10px;
        font-family: var(--font-mono);
        font-style: normal;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: var(--muted);
        text-transform: uppercase;
      }

      /* corner stamp */
      .stamp {
        position: absolute;
        bottom: 56px; left: 140px;
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.3em;
        color: var(--muted);
        text-transform: uppercase;
        z-index: 4;
        display: flex; align-items: center; gap: 14px;
      }
      .stamp .sq {
        width: 10px; height: 10px;
        background: var(--accent);
      }
      .stamp-r {
        position: absolute;
        bottom: 56px; right: 140px;
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.3em;
        color: var(--muted);
        text-transform: uppercase;
        z-index: 4;
      }
    </style>

      <div class="scene clip" id="s1" data-start="0" data-duration="6" data-track-index="0">

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // ============================================================
      // SCENE 1 (0–6s) — Brand-in-motion mood board assembling itself
      // ============================================================

      // --- 1) Color swatches fly in on arcs (0.0–1.4s) ---
      // Each swatch travels a different arc by chaining x/y tweens with different eases.
      var swatchIds = ["#sw1", "#sw2", "#sw3", "#sw4", "#sw5", "#sw6"];
      var swatchArcs = [
        { dx: -1100, dy:  60, rot: -22, t: 0.05 },
        { dx: -1200, dy: -120, rot:  18, t: 0.15 },
        { dx: -1050, dy: 140, rot: -14, t: 0.25 },
        { dx: -1300, dy: -40, rot:  24, t: 0.35 },
        { dx: -1150, dy: 100, rot: -10, t: 0.45 },
        { dx: -1250, dy: -90, rot:  20, t: 0.55 }
      ];
      swatchArcs.forEach(function (cfg, i) {
        var sel = swatchIds[i];
        // start position
        tl.set(sel, { x: cfg.dx, y: cfg.dy, rotation: cfg.rot, autoAlpha: 0 }, 0);
        // arc: y first (different ease), then x lands
        tl.to(sel, { autoAlpha: 1, duration: 0.2, ease: "power1.out" }, cfg.t);
        tl.to(sel, { y: 0, duration: 0.85, ease: "sine.inOut" }, cfg.t);
        tl.to(sel, { x: 0, rotation: 0, duration: 0.95, ease: "power3.out" }, cfg.t);
      });

      // tiny settle wobble on the cobalt swatch
      tl.to("#sw2", { y: -3, duration: 0.18, ease: "sine.out", yoyo: true, repeat: 1 }, 1.15);

      // --- 2) Logo spin-in with bounce settle (1.0–1.9s) ---
      tl.set("#logo-stage", { scale: 0, rotation: -180, autoAlpha: 0, transformOrigin: "50% 50%" }, 0);
      tl.to("#logo-stage", { autoAlpha: 1, duration: 0.15, ease: "power1.out" }, 1.0);
      tl.to("#logo-stage", { scale: 1.06, rotation: 0, duration: 0.7, ease: "back.out(2.2)" }, 1.0);
      tl.to("#logo-stage", { scale: 1.0, duration: 0.25, ease: "power2.out" }, 1.7);
      tl.set("#logo-cap", { autoAlpha: 0, y: 8 }, 0);
      tl.to("#logo-cap", { autoAlpha: 1, y: 0, duration: 0.4, ease: "power2.out" }, 1.85);

      // --- 3) Screenshots tossed in from the right (1.6–3.0s) ---
      var cardCfg = [
        { sel: "#card-1", t: 1.65, fromX: 1400, fromY:  -80, fromR:  18, toR: -4.5 },
        { sel: "#card-2", t: 1.80, fromX: 1500, fromY:  120, fromR: -22, toR:  3 },
        { sel: "#card-3", t: 1.95, fromX: 1600, fromY:  -40, fromR:  26, toR:  2.2 },
        { sel: "#card-4", t: 2.10, fromX: 1450, fromY:  160, fromR: -18, toR: -3 },
        { sel: "#card-5", t: 2.25, fromX: 1550, fromY: -100, fromR:  14, toR: -2 }
      ];
      cardCfg.forEach(function (c) {
        tl.set(c.sel, { x: c.fromX, y: c.fromY, rotation: c.fromR, autoAlpha: 0, transformOrigin: "50% 50%" }, 0);
        tl.to(c.sel, { autoAlpha: 1, duration: 0.18, ease: "power1.out" }, c.t);
        tl.to(c.sel, { x: 0, y: 0, rotation: c.toR, duration: 0.75, ease: "power3.out" }, c.t);
        // tiny settle bump
        tl.to(c.sel, { y: -4, duration: 0.12, ease: "sine.out", yoyo: true, repeat: 1 }, c.t + 0.7);
      });

      // sticky note drops in
      tl.set("#sticky", { y: -40, scale: 0.85, autoAlpha: 0, rotation: -12, transformOrigin: "50% 0%" }, 0);
      tl.to("#sticky", { autoAlpha: 1, y: 0, scale: 1, rotation: -5, duration: 0.55, ease: "back.out(1.8)" }, 2.4);

      // --- 4) Typography writes itself out (2.6–3.8s) ---
      var t1 = "Fraunces";
      var t2 = "ARCHIVO";

      tl.set("#type-1", { text: "" }, 0);
      tl.set("#type-2", { text: "" }, 0);

      var t1Obj = { i: 0 };
      tl.to(t1Obj, {
        i: t1.length,
        duration: 0.7,
        ease: "steps(" + t1.length + ")",
        onUpdate: function () {
          var n = Math.round(t1Obj.i);
          document.getElementById("type-1").textContent = t1.slice(0, n) + (n < t1.length ? "▍" : "");
        }
      }, 2.65);
      tl.set("#type-1", {}, 3.36);
      tl.call(function () { document.getElementById("type-1").textContent = t1; }, null, 3.4);

      var t2Obj = { i: 0 };
      tl.to(t2Obj, {
        i: t2.length,
        duration: 0.6,
        ease: "steps(" + t2.length + ")",
        onUpdate: function () {
          var n = Math.round(t2Obj.i);
          document.getElementById("type-2").textContent = t2.slice(0, n) + (n < t2.length ? "▍" : "");
        }
      }, 3.05);
      tl.call(function () { document.getElementById("type-2").textContent = t2; }, null, 3.7);

      tl.from("#type-1-meta", { autoAlpha: 0, x: -16, duration: 0.4, ease: "power2.out" }, 3.45);
      tl.from("#type-2-meta", { autoAlpha: 0, x: -16, duration: 0.4, ease: "power2.out" }, 3.75);

      // --- 5) Golden connectors trace themselves (3.7–4.8s) ---
      // make sure all line + node visuals are FORCED hidden at t=0 so nothing flashes on first frame
      tl.set("#connectors path", { strokeDashoffset: function (i, el) { return el.getAttribute("stroke-dasharray"); } }, 0);
      tl.set("#connectors circle", { opacity: 0 }, 0);
