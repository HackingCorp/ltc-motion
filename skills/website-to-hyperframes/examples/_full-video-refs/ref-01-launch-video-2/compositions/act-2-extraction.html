        // Schedule image scrolls: fast transition (0.25s) between stops
        stops.forEach(function (s, i) {
          var prev = i === 0 ? 0 : stops[i - 1].y;
          if (s.y !== prev) {
            tl.to(img, { y: s.y, duration: 0.25, ease: "power2.inOut" }, s.t - 0.05);

        // Callout timing (short hold so adjacent stops don't overlap)
        var HOLD = 0.70;
        stops.forEach(function (s, i) {
          var inT  = s.t + 0.20;
          var outT = s.t + 0.20 + HOLD;
          s.cal.forEach(function (ix, j) {
            tl.fromTo(cals[ix],
              { opacity: 0, x: -6, scale: 0.95 },
              { opacity: 1, x: 0, scale: 1, duration: 0.22, ease: "power2.out" },
              inT + 0.05 + j * 0.08
            );
            tl.to(cals[ix], { opacity: 0, x: 6, duration: 0.22, ease: "power2.in" }, outT);
          });
        });

        /* ════ design.md writes — synced to stops ═══ */
        var dpSchedule = [
          { line: 2,  t: 0.55 }, // ## Colors
          { line: 9,  t: 1.40 }, // ## Typography
          { line: 10, t: 1.55 }, // display
          { line: 3,  t: 2.10 }, // --primary
          { line: 11, t: 3.35 }, // body
          { line: 12, t: 3.50 }, // stat
          { line: 4,  t: 4.55 }, // --accent
          { line: 14, t: 5.70 }, // ## Assets
          { line: 15, t: 5.90 }, // 3d-cube
          { line: 16, t: 6.95 }, // avatar
          { line: 17, t: 7.15 }, // logo
          { line: 5,  t: 8.10 }, // --bg
          { line: 18, t: 8.30 }, // motion
          { line: 6,  t: 9.30 }, // --fg
          { line: 7,  t: 9.50 }, // --muted
          { line: 20, t: 10.40 }, // ## Layout
          { line: 21, t: 10.60 }, // radius-lg
          { line: 22, t: 10.80 }, // radius-md
          { line: 23, t: 11.00 }, // grid
        ];
        dpSchedule.forEach(function (d) {
          if (dpLines[d.line]) {
            tl.to(dpLines[d.line], { opacity: 1, x: 0, duration: 0.25, ease: "power2.out" }, d.t);
          }
        });

        /* ════ 11.3–14.8s: outro — zoom design.md, stamp swap, stats populate ═ */
        tl.to(lap, { opacity: 0.3, scale: 0.95, duration: 0.8, ease: "power2.inOut", transformOrigin: "left center" }, 11.60);
        tl.to(panel, { scale: 1.06, x: -30, duration: 0.9, ease: "power2.inOut", transformOrigin: "center" }, 11.60);

        dpStats.forEach(function (s, i) {
          tl.fromTo(s, { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.25, ease: "power2.out" }, 12.40 + i * 0.18);
        });

        tl.to(stampIng, { opacity: 0, duration: 0.18, ease: "power2.in" }, 13.40);
        tl.to(stampEd, { opacity: 1, duration: 0.22, ease: "power2.out" }, 13.58);

        tl.to([lap, panel, secTitle], { opacity: 0.08, duration: 0.35, ease: "power2.in" }, 14.72);

        window.__timelines[COMP_ID] = tl;
      })();
    </script>
