<!doctype html>
<html><head><meta charset="utf-8"/><title>Beat 4B · each word IS its effect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,900;1,9..144,600&family=Bebas+Neue&family=VT323&family=Shrikhand&family=JetBrains+Mono:wght@500;700&display=swap">
<style>
  html,body{margin:0;width:1920px;height:1080px;overflow:hidden;background:#1A0E2A;color:#FFF6EC;font-family:'Fraunces',serif}
  .frame{position:relative;width:1920px;height:1080px;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(255,120,80,0.45), transparent 50%),
      radial-gradient(ellipse at 85% 20%, rgba(255,220,90,0.35), transparent 45%),
      radial-gradient(ellipse at 75% 85%, rgba(160,80,255,0.5), transparent 50%),
      radial-gradient(ellipse at 15% 85%, rgba(80,220,200,0.4), transparent 50%),
      linear-gradient(135deg, #2A0E3A 0%, #0E1A3A 100%);
    overflow:hidden}
  .grain{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.06) 0.7px, transparent 1px);background-size:3px 3px;pointer-events:none}
  .stack{position:absolute;left:120px;right:120px;top:90px;bottom:90px;display:flex;flex-direction:column;justify-content:space-between}
  .row{display:flex;align-items:center;gap:36px;font-size:110px;line-height:0.95;letter-spacing:-0.03em;font-weight:900;font-family:'Fraunces',serif}
  .row .n{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,246,236,0.55);background:rgba(255,255,255,0.08);padding:6px 12px;border-radius:4px;min-width:96px;text-align:center;flex-shrink:0}

  /* 1 · every fade — letters fall off into transparency */
  .fade-word{display:inline-flex}
  .fade-word span{display:inline-block;font-weight:900}
  .fade-word .f1{color:#FFF6EC}.fade-word .f2{color:rgba(255,246,236,0.85)}
  .fade-word .f3{color:rgba(255,246,236,0.55);filter:blur(1px)}
  .fade-word .f4{color:rgba(255,246,236,0.3);filter:blur(4px)}
  .fade-word .f5{color:rgba(255,246,236,0.12);filter:blur(8px)}

  /* 2 · every glow — radiant orange */
  .glow-word{font-family:'Shrikhand',serif;font-weight:400;color:#FFE07A;font-style:italic;
    text-shadow: 0 0 16px rgba(255,200,80,0.9), 0 0 40px rgba(255,150,60,0.7), 0 0 80px rgba(255,100,40,0.5), 0 0 140px rgba(255,100,40,0.3);
    font-size:130px}

  /* 3 · every word — each letter a different face */
  .word-word{letter-spacing:-0.01em;line-height:0.9}
  .word-word .w1{font-family:'Bebas Neue',sans-serif;color:#FF6AA8;font-weight:400;letter-spacing:0.02em}
  .word-word .w2{font-family:'Fraunces',serif;font-style:italic;font-weight:400;color:#7DE3D1}
  .word-word .w3{font-family:'VT323',monospace;color:#FFE07A;font-size:130px}
  .word-word .w4{font-family:'Shrikhand',serif;color:#B08AFF;font-weight:400;font-style:italic}
  .word-word .w5{font-family:'JetBrains Mono',monospace;color:#FFF6EC;font-weight:700;font-size:88px;letter-spacing:-0.05em}

  /* 4 · on the screen — CRT display block */
  .screen-wrap{display:inline-flex;align-items:center;background:#0A1530;border-radius:20px/12px;padding:14px 34px;box-shadow:0 0 0 6px #FFF6EC, 0 0 0 10px #0A1530, 0 20px 40px rgba(0,0,0,0.4);
    background-image:repeating-linear-gradient(to bottom, rgba(255,255,255,0.04) 0 2px, transparent 2px 4px);}
  .screen-wrap span{font-family:'VT323',monospace;color:#22DDAA;text-shadow:0 0 8px rgba(34,221,170,0.8);font-size:120px;letter-spacing:0.02em;line-height:1}

  /* 5 · is a file — finder icon + filename */
  .file-chip{display:inline-flex;align-items:center;gap:20px;background:#FFF6EC;color:#1A0E2A;padding:14px 36px;border-radius:14px;box-shadow:0 20px 40px rgba(0,0,0,0.3)}
  .file-chip .ico{width:76px;height:96px;background:#FF6AA8;border-radius:4px;position:relative;flex-shrink:0}
  .file-chip .ico::before{content:'&lt;/&gt;';font-family:'JetBrains Mono',monospace;font-size:18px;color:#FFF6EC;font-weight:700;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);letter-spacing:-0.05em}
  .file-chip .ico::after{content:'';position:absolute;top:0;right:0;width:22px;height:22px;background:linear-gradient(135deg, transparent 50%, #FF9BC6 50%)}
  .file-chip .txt{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:90px;letter-spacing:-0.04em}
  .file-chip .txt em{font-style:italic;color:#B8320E;font-weight:700}

  /* 6 · you can open yourself — peeled open */
  .open-word{position:relative;display:inline-block;font-family:'Fraunces',serif;font-style:italic;font-weight:900;color:#FF6AA8;font-size:132px;line-height:0.9}
  .open-word::before{content:'';position:absolute;top:-8px;bottom:-8px;left:50%;width:4px;background:#FFE07A;box-shadow:0 0 20px #FFE07A}
  .open-word .lh{display:inline-block;transform:translateY(-10px) rotate(-2deg);transform-origin:right center}
  .open-word .rh{display:inline-block;transform:translateY(10px) rotate(2deg);transform-origin:left center;color:#FFE07A}

  .hud{position:absolute;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,246,236,0.7)}
  .hud.tl{top:40px;left:120px}
  .hud.tr{top:40px;right:120px;color:#FFE07A;text-align:right}
  .hud.br{bottom:40px;right:120px;color:#FF6AA8;text-align:right}
</style></head>
<body>
<div class="frame">
  <div class="hud tl">● beat 04 · variant B · &ldquo;each word IS its effect&rdquo;</div>
  <div class="hud tr">21.1s &ndash; 25.8s</div>

  <div class="stack">
    <div class="row">
      <span class="n">01</span>
      <span class="fade-word">
        <span class="f1">e</span><span class="f1">v</span><span class="f1">e</span><span class="f2">r</span><span class="f2">y</span>&nbsp;<span class="f2">f</span><span class="f3">a</span><span class="f4">d</span><span class="f5">e</span>
      </span>
    </div>

    <div class="row">
      <span class="n">02</span>
      <span class="glow-word">every glow</span>
    </div>

    <div class="row">
      <span class="n">03</span>
      <span class="word-word">
        <span class="w1">e</span><span class="w2">v</span><span class="w3">e</span><span class="w4">r</span><span class="w5">y</span>
        &nbsp;
        <span class="w3">w</span><span class="w1">o</span><span class="w4">r</span><span class="w2">d</span>
      </span>
    </div>

    <div class="row">
      <span class="n">04</span>
      <span class="screen-wrap"><span>&gt; on the screen_</span></span>
    </div>

    <div class="row">
      <span class="n">05</span>
      <span class="file-chip"><span class="ico"></span><span class="txt">is a <em>.html</em></span></span>
    </div>

    <div class="row">
      <span class="n">06</span>
      <span class="open-word">
        <span class="lh">you can open</span>&nbsp;<span class="rh">yourself</span>
      </span>
    </div>
  </div>

  <div class="grain"></div>
  <div class="hud br">04 / 08 &nbsp; chorus · variant B</div>
</div>
</body></html>
