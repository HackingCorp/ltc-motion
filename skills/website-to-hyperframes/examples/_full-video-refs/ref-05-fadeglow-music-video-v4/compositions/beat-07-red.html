<script>
(function(){
  const DUR = 2.11;
  // Words rel to 33.80: Want 0.0 this 0.14 spotlight 0.54 Red 0.94 Go 1.54 ahead 1.74
  const tl = gsap.timeline({ paused: true });
  // Transition IN: zoom-through SHORT (matches b6 forward push, compressed for 2.11s beat)

  tl.to('.xf-b7', { x:-80, scale:0.94, filter:'blur(8px)', opacity:0.25, duration:0.25, ease:'power2.in', overwrite:'auto' }, DUR - 0.25);

  tl.from('#b7-beam', { opacity:0, scaleY:0, duration:0.5, ease:'power2.out', transformOrigin:'top center' }, 0.05);
  tl.from('#b7-sub', { y:40, opacity:0, duration:0.3, ease:'power3.out' }, 0.0);
  tl.from('#b7-word', { scale:0.4, opacity:0, duration:0.35, ease:'back.out(2)' }, 0.94);
  tl.from('#b7-go', { y:-40, opacity:0, rotation:0, duration:0.35, ease:'back.out(1.8)' }, 1.54);
  tl.from('#b7-c1', { scale:0, opacity:0, duration:0.35, ease:'back.out(1.6)' }, 0.1);
  tl.from('#b7-c2', { scale:0, opacity:0, duration:0.35, ease:'back.out(1.6)' }, 0.2);
  tl.from('#b7-c3', { scaleY:0, opacity:0, duration:0.4, ease:'power3.out', transformOrigin:'bottom center' }, 0.15);
  tl.from('#b7-b1', { scaleX:0, duration:0.3, ease:'power3.out', transformOrigin:'right center' }, 0.3);
  tl.from('#b7-b2', { scaleX:0, duration:0.3, ease:'power3.out', transformOrigin:'right center' }, 0.4);
  tl.from('#b7-reg', { scale:0, opacity:0, duration:0.3, ease:'back.out(2)' }, 0.5);
  tl.from('#b7-tl,#b7-tr,#b7-bl,#b7-br', { opacity:0, duration:0.3, stagger:0.06 }, 0.2);
  // Pulsate RED once more on "ahead"

  tl.to('#b7-word', { scale:1.0, duration:0.25, ease:'power2.inOut' }, 1.94);
  tl.to({}, { duration: DUR }, 0);
  window.__timelines = window.__timelines || {};
