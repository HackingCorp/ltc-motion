<script>
(function(){

  // Transition IN: curve-right (enters from x:-80 — matches b4's rightward exit)

  tl.from('#b5-tl,#b5-br', { opacity:0, duration:0.35, stagger:0.08 }, 0.1);
  tl.from('#b5-canvas', { opacity:0, duration:0.4, ease:'power2.out' }, 0.2);
  tl.from('#b5-insp', { x:80, opacity:0, duration:0.5, ease:'power3.out' }, 0.35);
  // Lyric entrances
  tl.from('#b5-w-ooh', { y:40, opacity:0, duration:0.35, ease:'power3.out' }, 0.14);
  tl.from('#b5-w-template', { scale:0.7, opacity:0, duration:0.5, ease:'back.out(1.6)' }, 1.38);
  tl.from('#b5-w-baby', { x:-40, opacity:0, duration:0.4, ease:'power2.out' }, 1.58);
  // Boxes pop in one by one

  tl.from('#b5-bx2', { scale:0.8, opacity:0, duration:0.3, ease:'back.out(1.8)' }, 0.8);
  tl.from('#b5-bx3', { scale:0.8, opacity:0, duration:0.3, ease:'back.out(1.8)' }, 1.0);
  tl.from('#b5-bx4', { scaleX:0, opacity:0, duration:0.35, ease:'power3.out', transformOrigin:'left center' }, 1.2);
  // Tag flash on second "template"
  tl.from('#b5-tag', { scale:0, duration:0.3, ease:'back.out(2)' }, 1.5);
  // Second "ooh it's a template" cycle — inspector pulse + box selection pop

  tl.to('#b5-bx2', { scale:1.0, duration:0.25, ease:'power2.inOut', overwrite:'auto' }, 2.88);

  tl.to({}, { duration: DUR }, 0);
  window.__timelines = window.__timelines || {};
  window.__timelines["beat-05-template"] = tl;
})();
