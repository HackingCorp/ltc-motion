<script>
(function(){
  const DUR = 5.64;
  // Words rel to 35.92: It's 0.68, just 1.28, a 1.55, div 1.65, and 1.88, a 2.00, timeline 2.05, baby 2.82
  //   Edit 3.00, the 3.28, code 3.58, render 4.58, it 4.82, fresh 4.97-5.12
  const tl = gsap.timeline({ paused: true });
  // Transition IN: curve-left (enters from x:+80 — matches b7's leftward exit)
  tl.fromTo('.xf-b8', { x:80, scale:1.04, filter:'blur(10px)', opacity:0.25 }, { x:0, scale:1, filter:'blur(0px)', opacity:1, duration:0.35, ease:'expo.out' }, 0);
  // Transition OUT: gentle fade (final beat)
  tl.to('.xf-b8', { scale:0.98, filter:'blur(6px)', opacity:0, duration:0.5, ease:'power2.in', overwrite:'auto' }, DUR - 0.5);
  // Opening chrome
  tl.from('#b8-chrome', { y:60, opacity:0, duration:0.5, ease:'power3.out' }, 0.05);
  tl.from('#b8-tb', { y:-30, opacity:0, duration:0.35, ease:'power2.out' }, 0.2);
  // Code lines stagger in as lyric lands
  tl.from('#b8-editor .code', { opacity:0, duration:0.4 }, 0.8);
  tl.from('#b8-editor .gutter', { x:-20, opacity:0, duration:0.35, ease:'power2.out' }, 0.8);
  // Highlight the div tag on "div" word (1.65)
  tl.from('#b8-hldiv', { backgroundColor:'transparent', boxShadow:'0 0 0 0 rgba(184,50,14,0)', duration:0.3, ease:'power2.out' }, 1.55);
  // Preview panel slides in on "timeline" (2.05)
  tl.from('#b8-canv', { x:80, opacity:0, scale:0.9, duration:0.5, ease:'power3.out' }, 2.05);
  tl.from('#b8-badge', { scale:0, duration:0.3, ease:'back.out(2)' }, 2.35);
  // "edit the code" appears on "Edit" word (3.00)
  tl.from('#b8-edit', { y:20, opacity:0, duration:0.4, ease:'power3.out' }, 3.00);
  // "render it fresh." slides in from right at 4.57 (0.4s before the word "fresh" lands)
  gsap.set('#b8-fresh-line', { opacity:0, x:140 });
  tl.to('#b8-fresh-line', { opacity:1, x:0, duration:0.3, ease:'power3.out', overwrite:'auto' }, 4.37);
  // Rainbow highlight band (yellow → hot-pink → white → cyan → yellow) sweeps across text
  tl.fromTo('#b8-fresh-line', { backgroundPosition:'100% 0' }, { backgroundPosition:'0% 0', duration:0.7, ease:'power2.inOut' }, 4.50);
  // "fresh!" sparks etc. on 4.58
  tl.from('#b8-fresh', { scale:0, rotation:30, duration:0.4, ease:'back.out(2)' }, 4.58);
  tl.from('#b8-sp1', { scale:0, duration:0.25, ease:'back.out(2)' }, 4.65);
  tl.from('#b8-sp2', { scale:0, duration:0.25, ease:'back.out(2)' }, 4.78);
  tl.from('#b8-sp3', { scale:0, duration:0.25, ease:'back.out(2)' }, 4.92);
  // Playhead sweeps across timeline throughout
  tl.fromTo('#b8-play', { left:'0%' }, { left:'98%', duration: DUR, ease:'none' }, 0);
  // Playhead readout
  const steps = 12;
  for(let i=0;i<=steps;i++){
    const t = i*DUR/steps;
    const playT = (35.92 + t).toFixed(1);
    tl.call(()=>{ const el=document.querySelector('[data-composition-id="beat-08-div-timeline"] #b8-playhead'); if(el) el.textContent='playhead '+playT+'s'; }, null, t);
  }
  tl.to({}, { duration: DUR }, 0);
  window.__timelines = window.__timelines || {};
  window.__timelines["beat-08-div-timeline"] = tl;
})();
</script>
