      [data-composition-id="gsap-grid"] .scanlines {
        position: absolute; inset: 0; z-index: 80;
        background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
        pointer-events: none;
      }
      [data-composition-id="gsap-grid"] .vignette {
        position: absolute; inset: 0; z-index: 85;
        background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
        pointer-events: none;
      }
      [data-composition-id="gsap-grid"] .bleed-bottom {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; z-index: 90;
        background: linear-gradient(90deg, rgba(255,180,70,0.4), rgba(0,200,200,0.35), rgba(200,0,255,0.4));
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const scope = document.querySelector('[data-composition-id="gsap-grid"]');
      const q = (sel) => scope.querySelector(sel);
      const qa = (sel) => scope.querySelectorAll(sel);

      // Generate waveform bars deterministically
      const wf = q('#waveform');
      let seed = 77;
      function srand() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed % 10000) / 10000; }
      for (let i = 0; i < 20; i++) {
        const bar = document.createElement('div');
        bar.className = 'wf-bar';
        bar.style.height = (10 + srand() * 40) + 'px';
        bar.style.animationDelay = (srand() * 1.5) + 's';
        wf.appendChild(bar);
      }

      // Generate wave paths deterministically
      const waves = qa('.wave');
      waves.forEach((w, wi) => {
        let d = 'M0,30';
        for (let x = 0; x <= 120; x += 4) {
          const phase = wi * 2.1;
          const y = 30 + Math.sin((x / 15) + phase) * (10 + wi * 5);
          d += ` L${x},${y.toFixed(1)}`;
        }
        w.setAttribute('d', d);
      });

      // Set up motion path dot
      const motionDot = q('.motion-dot');
      if (motionDot) {
        motionDot.setAttribute('cx', '10');
        motionDot.setAttribute('cy', '50');
      }

      // Grid cells fade in with stagger
      const cells = qa('.cell');
      cells.forEach((c, i) => {
        tl.fromTo(c, { opacity: 0 }, { opacity: 1, duration: 0.15 }, i * 0.03);
      });

      // Center label fades in at ~3s
      tl.to(q('#center-label'), { opacity: 1, duration: 0.5, ease: 'power2.out' }, 3.0);

      // Glow pools drift
      tl.to(q('.g-orange'), { x: 30, y: -20, duration: 5, ease: 'none' }, 0);
      tl.to(q('.g-cyan'), { x: -20, y: 15, duration: 5, ease: 'none' }, 0);

      // Hold to end
      tl.to({}, { duration: 0.5 }, 4.5);

      window.__timelines["gsap-grid"] = tl;
    </script>
  </div>
</template>
