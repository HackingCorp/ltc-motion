<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1080px;
        height: 1920px;
        font-family: "DM Sans", sans-serif;
      }

      #root .scene {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(140% 90% at 50% 0%, #10402b 0%, #0a2c1d 55%, #071f15 100%);
        overflow: hidden;
      }

      /* Soft decorative rings */
      #root .ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.06);
      }
      #root .ring-1 {
        width: 1400px;
        height: 1400px;
        top: -420px;
        left: -160px;
      }
      #root .ring-2 {
        width: 1000px;
        height: 1000px;
        top: -220px;
        left: 40px;
      }

      #root .kicker {
        position: absolute;
        top: 150px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.32em;
        color: #7fd4a8;
        text-transform: uppercase;
        white-space: nowrap;
      }

      #root .product-card {
        position: absolute;
        top: 260px;
        left: 50%;
        transform: translateX(-50%);
        width: 760px;
        height: 760px;
        border-radius: 56px;
        overflow: hidden;
        box-shadow:
          0 60px 120px rgba(0, 0, 0, 0.45),
          0 0 0 10px rgba(255, 255, 255, 0.05);
      }
      #root .product-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #root .product-name {
        position: absolute;
        top: 1090px;
        width: 100%;
        text-align: center;
        font-size: 84px;
        font-weight: 900;
        color: #ffffff;
        letter-spacing: -0.02em;
        line-height: 1.05;
        padding: 0 80px;
        box-sizing: border-box;
      }

      #root .price-badge {
        position: absolute;
        top: 1260px;
        left: 50%;
        transform: translateX(-50%) rotate(-4deg);
        background: #ffcf3f;
        color: #14603e;
        font-size: 72px;
        font-weight: 900;
        padding: 22px 64px;
        border-radius: 26px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        white-space: nowrap;
      }
      #root .price-badge .old-price {
        font-size: 44px;
        font-weight: 700;
        text-decoration: line-through;
        opacity: 0.55;
        margin-right: 24px;
      }

      #root .cta {
        position: absolute;
        top: 1480px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 28px;
        background: #25d366;
        border-radius: 70px;
        padding: 30px 60px;
        box-shadow: 0 24px 70px rgba(37, 211, 102, 0.4);
        white-space: nowrap;
      }
      #root .cta .wa-icon {
        width: 88px;
        height: 88px;
        flex-shrink: 0;
      }
      #root .cta .wa-icon svg {
        width: 88px;
        height: 88px;
        display: block;
      }
      #root .cta-text {
        display: flex;
        flex-direction: column;
      }
      #root .cta-label {
        font-size: 44px;
        font-weight: 900;
        color: #063d1e;
        letter-spacing: 0.01em;
      }
      #root .cta-number {
        font-size: 38px;
        font-weight: 700;
        color: #0b5c30;
      }

      #root .footnote {
        position: absolute;
        top: 1720px;
        width: 100%;
        text-align: center;
        font-size: 30px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="product-promo-vertical"
      data-width="1080"
      data-height="1920"
      data-start="0"
      data-duration="7"
    >
      <div
        id="scene"
        class="clip scene"
        data-start="0"
        data-duration="7"
        data-track-index="0"
      >
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>

        <div id="kicker" class="kicker">Offre spéciale</div>

        <div id="product-card" class="product-card">
          <img src="assets/product.svg" alt="Produit" crossorigin="anonymous" />
        </div>

        <div id="product-name" class="product-name">Nom du produit</div>

        <div id="price-badge" class="price-badge">
          <span class="old-price">25 000 FCFA</span>19 500 FCFA
        </div>

        <div id="cta" class="cta">
          <span class="wa-icon">
            <svg viewBox="0 0 32 32" fill="none">
              <path
                d="M16 3C8.82 3 3 8.82 3 16c0 2.29.6 4.44 1.65 6.31L3 29l6.86-1.6A12.93 12.93 0 0 0 16 29c7.18 0 13-5.82 13-13S23.18 3 16 3z"
                fill="#063d1e"
              />
              <path
                d="M12.07 9.6c-.3-.66-.6-.67-.88-.68l-.75-.01c-.26 0-.68.1-1.04.48-.36.39-1.36 1.33-1.36 3.24s1.4 3.76 1.59 4.02c.2.26 2.7 4.32 6.65 5.88 3.29 1.3 3.96 1.04 4.67.97.71-.06 2.3-.94 2.63-1.85.32-.9.32-1.68.23-1.84-.1-.16-.36-.26-.75-.45-.39-.2-2.3-1.14-2.66-1.27-.36-.13-.62-.2-.88.2-.26.39-1.01 1.27-1.24 1.53-.23.26-.45.29-.84.1-.39-.2-1.64-.61-3.13-1.93-1.16-1.03-1.94-2.3-2.16-2.7-.23-.38-.03-.6.17-.79.17-.17.39-.45.58-.68.2-.23.26-.39.39-.65.13-.26.06-.49-.03-.68-.1-.2-.85-2.12-1.19-2.89z"
                fill="#25d366"
              />
            </svg>
          </span>
          <span class="cta-text">
            <span class="cta-label">Commandez sur WhatsApp</span>
            <span class="cta-number">+237 6 00 00 00 00</span>
          </span>
        </div>

        <div id="footnote" class="footnote">Livraison partout · Paiement à la réception</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      var tl = gsap.timeline({ paused: true });

      var kicker = document.getElementById("kicker");
      var card = document.getElementById("product-card");
      var name = document.getElementById("product-name");
      var price = document.getElementById("price-badge");
      var cta = document.getElementById("cta");
      var footnote = document.getElementById("footnote");

      // Initial states
      gsap.set(kicker, { opacity: 0, y: -40 });
      gsap.set(card, { opacity: 0, y: 120, scale: 0.9 });
      gsap.set(name, { opacity: 0, y: 60 });
      gsap.set(price, { opacity: 0, scale: 0.3, rotate: -18 });
      gsap.set(cta, { opacity: 0, y: 100 });
      gsap.set(footnote, { opacity: 0 });

      // Kicker fades down
      tl.to(kicker, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0.15);

      // Product card drops in with spring
      tl.to(
        card,
        { opacity: 1, y: 0, scale: 1, duration: 0.9, ease: "elastic.out(1, 0.65)" },
        0.35,
      );

      // Product name rises
      tl.to(name, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.9);

      // Price badge stamps in
      tl.to(
        price,
        { opacity: 1, scale: 1, rotate: -4, duration: 0.55, ease: "back.out(2.2)" },
        1.25,
      );

      // CTA slides up
      tl.to(cta, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 1.7);

      // Footnote fades
      tl.to(footnote, { opacity: 1, duration: 0.5, ease: "none" }, 2.1);

      // CTA heartbeat pulses (seek-safe: fixed keyframes on the timeline)
      tl.to(cta, { scale: 1.05, duration: 0.35, ease: "power1.inOut" }, 3.0);
      tl.to(cta, { scale: 1, duration: 0.35, ease: "power1.inOut" }, 3.36);
      tl.to(cta, { scale: 1.05, duration: 0.35, ease: "power1.inOut" }, 4.4);
      tl.to(cta, { scale: 1, duration: 0.35, ease: "power1.inOut" }, 4.76);

      // Price wiggle for attention
      tl.to(price, { rotate: 2, duration: 0.3, ease: "power1.inOut" }, 3.6);
      tl.to(price, { rotate: -4, duration: 0.3, ease: "power1.inOut" }, 3.91);

      // Everything settles, then scene eases out
      tl.to(
        [kicker, card, name, price, cta, footnote],
        { opacity: 0, y: "-=40", duration: 0.45, ease: "power2.in", stagger: 0.04 },
        6.3,
      );

      window.__timelines["product-promo-vertical"] = tl;
    </script>
  </body>
</html>
