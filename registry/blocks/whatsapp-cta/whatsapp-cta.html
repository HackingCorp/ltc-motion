<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1080px;
        height: 1920px;
        font-family: "DM Sans", sans-serif;
      }

      #root .pill {
        position: absolute;
        bottom: 190px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 26px;
        background: #ffffff;
        border-radius: 80px;
        padding: 22px 52px 22px 22px;
        box-shadow: 0 14px 60px rgba(0, 0, 0, 0.35);
        white-space: nowrap;
      }

      #root .wa-badge {
        position: relative;
        width: 116px;
        height: 116px;
        border-radius: 50%;
        background: #25d366;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      #root .wa-badge svg {
        width: 66px;
        height: 66px;
        display: block;
      }
      /* Expanding pulse ring around the badge */
      #root .pulse-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 5px solid #25d366;
        opacity: 0;
      }

      #root .copy {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #root .label {
        font-size: 40px;
        font-weight: 900;
        color: #101010;
        letter-spacing: -0.01em;
      }
      #root .number {
        font-size: 36px;
        font-weight: 700;
        color: #128c4b;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="whatsapp-cta"
      data-width="1080"
      data-height="1920"
      data-start="0"
      data-duration="5"
    >
      <div id="pill" class="clip pill" data-start="0" data-duration="5" data-track-index="0">
        <div id="wa-badge" class="wa-badge">
          <div id="pulse-ring" class="pulse-ring"></div>
          <svg viewBox="0 0 32 32" fill="none">
            <path
              d="M16 3C8.82 3 3 8.82 3 16c0 2.29.6 4.44 1.65 6.31L3 29l6.86-1.6A12.93 12.93 0 0 0 16 29c7.18 0 13-5.82 13-13S23.18 3 16 3z"
              fill="#ffffff"
            />
            <path
              d="M12.07 9.6c-.3-.66-.6-.67-.88-.68l-.75-.01c-.26 0-.68.1-1.04.48-.36.39-1.36 1.33-1.36 3.24s1.4 3.76 1.59 4.02c.2.26 2.7 4.32 6.65 5.88 3.29 1.3 3.96 1.04 4.67.97.71-.06 2.3-.94 2.63-1.85.32-.9.32-1.68.23-1.84-.1-.16-.36-.26-.75-.45-.39-.2-2.3-1.14-2.66-1.27-.36-.13-.62-.2-.88.2-.26.39-1.01 1.27-1.24 1.53-.23.26-.45.29-.84.1-.39-.2-1.64-.61-3.13-1.93-1.16-1.03-1.94-2.3-2.16-2.7-.23-.38-.03-.6.17-.79.17-.17.39-.45.58-.68.2-.23.26-.39.39-.65.13-.26.06-.49-.03-.68-.1-.2-.85-2.12-1.19-2.89z"
              fill="#25d366"
            />
          </svg>
        </div>
        <div class="copy">
          <span class="label">Commandez sur WhatsApp</span>
          <span class="number">+237 6 00 00 00 00</span>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      var tl = gsap.timeline({ paused: true });

      var pill = document.getElementById("pill");
      var badge = document.getElementById("wa-badge");
      var ring = document.getElementById("pulse-ring");

      // Start off-screen below
      gsap.set(pill, { y: 320, opacity: 0 });
      gsap.set(ring, { scale: 1, opacity: 0 });

      // Slide in with spring
      tl.to(pill, { y: 0, opacity: 1, duration: 0.6, ease: "back.out(1.6)" }, 0.1);

      // Badge tilts like a nudge
      tl.to(badge, { rotate: -12, duration: 0.12, ease: "power1.inOut" }, 1.0);
      tl.to(badge, { rotate: 10, duration: 0.12, ease: "power1.inOut" }, 1.13);
      tl.to(badge, { rotate: -6, duration: 0.1, ease: "power1.inOut" }, 1.26);
      tl.to(badge, { rotate: 0, duration: 0.1, ease: "power1.inOut" }, 1.37);

      // Two expanding pulse rings (seek-safe fixed keyframes)
      tl.set(ring, { scale: 1, opacity: 0.9 }, 1.5);
      tl.to(ring, { scale: 1.8, opacity: 0, duration: 0.7, ease: "power1.out" }, 1.5);
      tl.set(ring, { scale: 1, opacity: 0.9 }, 2.7);
      tl.to(ring, { scale: 1.8, opacity: 0, duration: 0.7, ease: "power1.out" }, 2.7);

      // Slide out
      tl.to(pill, { y: 320, opacity: 0, duration: 0.35, ease: "power3.in" }, 4.45);

      window.__timelines["whatsapp-cta"] = tl;
    </script>
  </body>
</html>
