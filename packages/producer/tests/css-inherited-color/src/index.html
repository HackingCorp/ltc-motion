<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #111; width: 1920px; height: 1080px; }
  .root {
    position: absolute; inset: 0;
    color: #e8e8e8;
    font-family: system-ui, sans-serif;
    font-size: 48px;
    letter-spacing: 0.02em;
    line-height: 1.4;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px;
  }
  .heading { font-size: 80px; font-weight: 700; }
  .body-text { max-width: 800px; text-align: center; }
  .explicit { color: #e8e8e8; font-family: system-ui, sans-serif; font-size: 48px; letter-spacing: 0.02em; }
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
  <div id="root" data-composition-id="css-inherited-color"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
    <div class="root" data-start="0" data-duration="3">
      <!-- Inherits color, font-family, font-size, letter-spacing, line-height from .root -->
      <div class="heading" id="inherited-heading">INHERITED STYLES</div>
      <div class="body-text" id="inherited-body">This text inherits color, font-family, font-size, letter-spacing, and line-height from the parent.</div>
      <!-- All properties set explicitly — control group -->
      <div class="explicit" id="explicit-text">EXPLICIT STYLES</div>
    </div>
  </div>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.from("#inherited-heading", { opacity: 0, y: 34, duration: 0.5, ease: "power2.out" }, 0);
    tl.from("#inherited-body", { opacity: 0, y: 20, duration: 0.5, ease: "power2.out" }, 0.1);
    tl.from("#explicit-text", { opacity: 0, y: 34, duration: 0.5, ease: "power2.out" }, 0.2);
    window.__timelines["css-inherited-color"] = tl;
  </script>
</body>
</html>
