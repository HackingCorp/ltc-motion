<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }

      #bg {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 120% 80% at 60% 50%, #1a1040 0%, #0a0a0f 70%);
      }

      #eyebrow {
        position: absolute;
        top: 340px;
        left: 160px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #7c6af0;
      }

      #headline {
        position: absolute;
        top: 390px;
        left: 160px;
        font-size: 96px;
        font-weight: 800;
        line-height: 1.05;
        color: #fff;
        max-width: 1000px;
      }

      #headline span {
        color: #7c6af0;
      }

      #sub {
        position: absolute;
        top: 620px;
        left: 160px;
        font-size: 28px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.55);
        max-width: 700px;
        line-height: 1.5;
      }

      #divider {
        position: absolute;
        top: 600px;
        left: 160px;
        width: 64px;
        height: 4px;
        background: #7c6af0;
        border-radius: 2px;
      }

      #badge {
        position: absolute;
        top: 380px;
        right: 160px;
        width: 360px;
        height: 360px;
        border-radius: 50%;
        border: 2px solid rgba(124, 106, 240, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #badge-inner {
        font-size: 128px;
        line-height: 1;
      }

      #tag {
        position: absolute;
        bottom: 80px;
        right: 160px;
        font-size: 18px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div
      data-hf-id="hf-gxr6"
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="8"
      data-width="1920"
      data-height="1080"
    >
      <!-- Background — always visible -->
      <div data-hf-id="hf-2xc0" id="bg"></div>

      <!-- Badge (right side) -->
      <div
        data-hf-id="hf-w4kq"
        id="badge"
        class="clip"
        data-start="0"
        data-duration="8"
        data-track-index="1"
      >
        <div data-hf-id="hf-aspg" id="badge-inner">🚀</div>
      </div>

      <!-- Eyebrow + headline block -->
      <div
        data-hf-id="hf-ld7j"
        id="eyebrow"
        class="clip"
        data-start="0.3"
        data-duration="7.7"
        data-track-index="2"
      >
        New Release
      </div>

      <div
        data-hf-id="hf-meo2"
        id="headline"
        class="clip"
        data-start="0.5"
        data-duration="7.5"
        data-track-index="3"
      >
        Build videos with<br data-hf-id="hf-x5px" /><span data-hf-id="hf-j4xb">HyperFrames</span>
      </div>

      <div
        data-hf-id="hf-yd4a"
        id="divider"
        class="clip"
        data-start="1.2"
        data-duration="6.8"
        data-track-index="4"
      ></div>

      <div
        data-hf-id="hf-gzqk"
        id="sub"
        class="clip"
        data-start="1.4"
        data-duration="6.6"
        data-track-index="5"
      >
        Write HTML, render video. Now with standalone<br data-hf-id="hf-rsrt" />
        <strong data-hf-id="hf-3g3d" style="color: rgba(255, 255, 255, 0.75)">parsers</strong>,
        <strong data-hf-id="hf-8joa" style="color: rgba(255, 255, 255, 0.75)">lint</strong>, and
        <strong data-hf-id="hf-jolv" style="color: rgba(255, 255, 255, 0.75)">studio-server</strong>
        packages.
      </div>

      <div
        data-hf-id="hf-4ucn"
        id="tag"
        class="clip"
        data-start="2"
        data-duration="6"
        data-track-index="6"
      >
        v0.7.13
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Badge spins in
      tl.from(
        "#badge",
        { scale: 0.4, opacity: 0, rotation: -45, duration: 0.9, ease: "back.out(1.4)" },
        0,
      );

      // Eyebrow slides up
      tl.from("#eyebrow", { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.3);

      // Headline word by word (stagger via clip mask)
      tl.from("#headline", { y: 40, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.5);

      // Divider grows from left
      tl.from(
        "#divider",
        { scaleX: 0, transformOrigin: "left center", duration: 0.4, ease: "power2.out" },
        1.2,
      );

      // Sub fades up
      tl.from("#sub", { y: 20, opacity: 0, duration: 0.6, ease: "power2.out" }, 1.4);

      // Tag fades in
      tl.from("#tag", { opacity: 0, duration: 0.4, ease: "none" }, 2);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
